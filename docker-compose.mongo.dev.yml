services:
  mongodb:
    image: mongo:8
    container_name: mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: app_db
      TZ: Europe/Bratislava
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' mongodb://root:root@localhost:27017/admin | grep 1"]
      interval: 15s
      timeout: 10s
      retries: 10

    # Spring Boot pripojenie:
    # spring.data.mongodb.uri=mongodb://root:root@localhost:27017/app_db?authSource=admin
    #
    # Maven/Gradle dependency:
    # org.springframework.boot:spring-boot-starter-data-mongodb

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express-dev
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

volumes:
  mongo_dev_data:
