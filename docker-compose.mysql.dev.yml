services:
  mysql:
    image: mysql:8.4.8
    container_name: mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      TZ: Europe/Bratislava
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

    # Spring Boot pripojenie:
    # spring.datasource.url=jdbc:mysql://localhost:3306/app_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Bratislava
    # spring.datasource.username=app_user
    # spring.datasource.password=app_pass
    # spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    #
    # Maven/Gradle dependency:
    # com.mysql:mysql-connector-j

  adminer:
    image: adminer:4
    container_name: adminer-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql

volumes:
  mysql_dev_data:
